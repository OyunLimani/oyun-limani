<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yılan Oyunu - Oyun Limanı</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #1a1a24;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    canvas {
      background-color: #2a2a35;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 2px solid #3f3f5a;
    }
    .score-board {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 16px;
      font-size: 24px;
      font-weight: bold;
      color: #00e5ff;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    #game-over {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
    }
    #game-over h2 {
      font-size: 36px;
      margin: 0 0 20px 0;
      color: #ff3366;
    }
    button {
      padding: 12px 30px;
      font-size: 18px;
      font-weight: bold;
      background: #00e5ff;
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover {
      transform: scale(1.05);
    }
    .controls {
      margin-top: 20px;
      text-align: center;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div id="game-container">
  <div class="score-board">
    <span>Skor: <span id="score">0</span></span>
    <span style="color: #ff3366">Oyun Limanı</span>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="controls">Yön tuşları veya WASD ile oynayın.</div>
  
  <div id="game-over">
    <h2>Oyun Bitti!</h2>
    <p style="font-size: 20px; margin-bottom: 30px;">Skorunuz: <span id="final-score">0</span></p>
    <button onclick="resetGame()">Tekrar Oyna</button>
  </div>
</div>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");
  const scoreElement = document.getElementById("score");
  const gameOverScreen = document.getElementById("game-over");
  const finalScoreElement = document.getElementById("final-score");

  const gridSize = 20;
  const tileCount = canvas.width / gridSize;
  
  let snake = [{x: 10, y: 10}];
  let food = {x: 15, y: 15};
  let dx = 0;
  let dy = 0;
  let score = 0;
  let gameLoop;
  let isGameOver = false;

  function drawGame() {
    if (isGameOver) return;

    clearScreen();
    changeSnakePosition();
    checkCollision();
    if (isGameOver) return;

    checkAppleCollision();
    drawApple();
    drawSnake();
  }

  function clearScreen() {
    ctx.fillStyle = "#2a2a35";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
  }

  function drawSnake() {
    snake.forEach((part, index) => {
      ctx.fillStyle = index === 0 ? "#00e5ff" : "#0099aa";
      ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
    });
  }

  function changeSnakePosition() {
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };
    snake.unshift(head);
    
    // Yem yenmediyse kuyruğu sil (hareket efekti)
    // Yem yendiyse (checkAppleCollision içinde) pop yapmayız, yılan uzar.
    // Ancak bu kontrolü burada geçici olarak yapıp popluyoruz, 
    // apple collisionda un-pop yapmak yerine elma kontrolünü önce yaparız.
  }

  function checkCollision() {
    const head = snake[0];
    
    // Duvar çarpışması
    if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
      gameOver();
    }
    
    // Kendi kendine çarpma
    for (let i = 1; i < snake.length; i++) {
      if (head.x === snake[i].x && head.y === snake[i].y) {
        gameOver();
      }
    }
  }

  function checkAppleCollision() {
    const head = snake[0];
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreElement.textContent = score;
      placeFood();
    } else {
      snake.pop(); // Yem yenmediyse kuyruğu küçült
    }
  }

  function drawApple() {
    ctx.fillStyle = "#ff3366";
    ctx.beginPath();
    ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
    ctx.fill();
  }

  function placeFood() {
    food.x = Math.floor(Math.random() * tileCount);
    food.y = Math.floor(Math.random() * tileCount);
    // Yılanın üstüne gelmemesi kontrolü eklenebilir
  }

  function gameOver() {
    isGameOver = true;
    clearInterval(gameLoop);
    gameOverScreen.style.display = "flex";
    finalScoreElement.textContent = score;
  }

  function resetGame() {
    snake = [{x: 10, y: 10}];
    dx = 0;
    dy = 0;
    score = 0;
    scoreElement.textContent = score;
    isGameOver = false;
    gameOverScreen.style.display = "none";
    placeFood();
    clearInterval(gameLoop);
    gameLoop = setInterval(drawGame, 100);
  }

  document.body.addEventListener("keydown", (event) => {
    // Sadece ok tuşlarını ve WASD'yi engelle ki sayfa kaymasın
    if([37, 38, 39, 40, 32].indexOf(event.keyCode) > -1) {
        event.preventDefault();
    }
    
    // Yılan başlangıçta duruyorsa ilk hareketi ver
    if (dx === 0 && dy === 0) {
      if (event.key === "ArrowUp" || event.key === "w") { dx = 0; dy = -1; }
      else if (event.key === "ArrowDown" || event.key === "s") { dx = 0; dy = 1; }
      else if (event.key === "ArrowLeft" || event.key === "a") { dx = -1; dy = 0; }
      else if (event.key === "ArrowRight" || event.key === "d") { dx = 1; dy = 0; }
      return;
    }

    if ((event.key === "ArrowUp" || event.key === "w") && dy !== 1) { dx = 0; dy = -1; }
    if ((event.key === "ArrowDown" || event.key === "s") && dy !== -1) { dx = 0; dy = 1; }
    if ((event.key === "ArrowLeft" || event.key === "a") && dx !== 1) { dx = -1; dy = 0; }
    if ((event.key === "ArrowRight" || event.key === "d") && dx !== -1) { dx = 1; dy = 0; }
  });

  // Oyunu başlat
  placeFood();
  gameLoop = setInterval(drawGame, 100);

  // Parent iframe focus için
  window.addEventListener('click', () => {
    window.focus();
  });
</script>

</body>
</html>
